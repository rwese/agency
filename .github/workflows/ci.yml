name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Format check
        run: uvx ruff format --check src/

      - name: Lint
        run: uvx ruff check src/

      - name: Validate JSON schemas
        run: uv run python scripts/validate_schemas.py

      - name: Generate Pydantic models
        run: uv run python scripts/generate_models.py

      - name: Check models are up to date
        run: |
          if ! git diff --quiet src/agency/models/; then
            echo "ERROR: Generated models are out of date. Run 'python scripts/generate_models.py' and commit."
            git diff src/agency/models/
            exit 1
          fi

      - name: Test
        run: uv run pytest tests/ --timeout=30 -v

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install package
        run: uv pip install -e .

      - name: Run E2E tests
        run: uv run pytest tests/test_e2e.py --timeout=60 -v
