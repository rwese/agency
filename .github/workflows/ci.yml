name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Lint
        run: uvx ruff check src/

      - name: Test
        run: uv run pytest tests/ --timeout=30 -v

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install package
        run: uv pip install -e .

      - name: Run E2E tests
        run: uv run pytest tests/test_e2e.py --timeout=60 -v
