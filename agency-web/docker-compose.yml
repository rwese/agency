services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agency
      POSTGRES_PASSWORD: agency_dev
      POSTGRES_DB: agency_web
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://agency:agency_dev@postgres:5432/agency_web
      AGENCY_PORT: 3000
      AGENCY_SECRET_KEY: dev_secret_key_change_in_production
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
